# about me
first-paragraph: I am a Computer Science PhD student at the <a href="https://www.uchicago.edu/en" target="_blank" rel="noopener">University of Chicago</a>, where I am a member of <a href="https://labs.globus.org/" target="_blank" rel="noopener">Globus Labs</a>, led by <a href="https://cs.uchicago.edu/people/ian-foster/" target="_blank" rel="noopener">Prof. Ian Foster</a> and <a href="https://kylechard.com/" target="_blank" rel="noopener">Dr. Kyle Chard</a>.
second-paragraph: Before pursuing my PhD, I earned an MS in Data Science from <a href="https://www.luc.edu/" target="_blank" rel="noopener">Loyola University Chicago</a>, where I completed my Master's thesis under the supervision of <a href="https://abuhamad.cs.luc.edu/" target="_blank" rel="noopener">Dr. Mohammed Abuhamad</a>. I defended my work on <a href="https://drive.google.com/file/d/1DuzTBMaGBus1fUfEtWtcX2zE9R2PKcQv/view" target="_blank" rel="noopener">enhanced CT-to-MRI synthesis for high-dose-rate brachytherapy treatment planning</a> with distinction.
research-introduction: My research focuses on leveraging machine learning to improve the quality and accessibility of healthcare. I develop deep learning models for medical imaging tasks such as image synthesis, reconstruction, segmentation, and enhancement, with applications in CT, MRI, and related modalities.

research-interests:

  - field: Computer Vision for Healthcare
    subfields: MRI reconstruction, CT-to-MRI synthesis, tumor segmentation

  - field: Machine Learning for Medicine
    subfields: image synthesis, reconstruction, enhancement, clinical AI
