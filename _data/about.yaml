# about me
first-paragraph: I am a research assistant with <a href="https://labs.globus.org/" target="_blank" rel="noopener">Globus Labs</a> affiliated with the <a href="https://computerscience.uchicago.edu/" target="_blank" rel="noopener">University of Chicago</a> under the guidance of <a href="https://computerscience.uchicago.edu/people/ian-foster/" target="_blank" rel="noopener">Prof. Ian Foster</a> and <a href="https://cs.uchicago.edu/people/kyle-chard/" target="_blank" rel="noopener">Dr. Kyle Chard</a>.
second-paragraph: 
research-introduction: I do research in machine learning for healthcare, mainly focusing on applying neural networks to enhance and extract meaning from medical images through reconstruction, segmentation, and synthesis of MRI, CT, and other modalities. 

