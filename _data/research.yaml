projects:

  - title: "BRISKNet: Breast Rapid Imaging via Self-Supervised Kinetics"
    system-name:
    gif: assets/img/research/brisknet.png
    conference: Current research
    conference-web: https://labs.globus.org/projects/mri.html
    status:
    authors: <u>Rachel Gordon</u>, Michael Maire, Gregory Karczmar, Zhen Ren, Milica Medved, Eddy Solomon, Laura Heacock, Olufunmilayo Olopade, Ian Foster, Kyle Chard, Anna Woodard.
    pdf:
    code:
    slides:
    abstract-less: Dynamic contrast-enhanced (DCE) breast MRI captures tumor vascularity through contrast kinetics, but clinical protocols face a fundamental trade-off between temporal resolution and spatial quality.
    abstract-more: Supervised deep learning reconstruction is inadequate because fully-sampled ground truth is impossible to obtain in dynamic MRI; undersampling is inherent to achieving clinically useful frame rates. This project develops an unsupervised, physics-informed reconstruction framework for multi-coil radial breast DCE-MRI that adapts an unrolled optimization network within a spatiotemporally equivariant training framework.
    tag: more_brisknet
    category: medical-imaging

  - title: Slice-Aware Attention for Quality Control of Breast MRI Segmentations
    system-name:
    gif: assets/img/research/segQC.png
    conference: IEEE International Conference on e-Science and Grid Computing, 2025
    conference-web: https://ieeexplore.ieee.org/abstract/document/11181493
    status:
    authors: Edwin Ma, <u>Rachel Gordon</u>, Anna Woodard, Ian Foster, Kyle Chard.
    pdf: https://ieeexplore.ieee.org/abstract/document/11181493
    code:
    slides:
    abstract-less: Quality control (QC) is essential for ensuring the reliability of automated tumor segmentations in breast magnetic resonance imaging (MRI), which are increasingly used in both clinical and research workflows. Manual QC by experts is subjective, time-consuming, and unscalable, highlighting the need for automated solutions.
    abstract-more: In this work, we propose a 2D convolutional neural network (CNN) with attention-based slice aggregation to classify the quality of tumor segmentations in breast MRI. Leveraging the large-scale, expert-annotated MAMA-MIA dataset, our method processes 2D slices as 2-channel inputs (image and segmentation) and learns to weight their contribution using an attention mechanism for volume-level classification. Our best-performing configuration (attention + augmentation) achieved 64% accuracy, 0.58 F1, and 0.67 AUC, outperforming other settings. These findings show that augmentation and attention are complementary; augmentation increases slice-level diversity, while attention helps identify informative slices among mostly uninformative ones. While performance was moderate, the results establish a baseline for scalable QC in breast MRI, with considerable potential for improvement through enhanced architectures, richer augmentations, and integration with 3D context.
    tag: more_segqc
    category: medical-imaging

  - title: CT-to-MRI Synthesis for High-dose-rate Brachytherapy Treatment Planning
    system-name: GAN-CM
    gif: assets/img/research/gancm-smri.png
    conference: Master's Thesis, Loyola University Chicago, 2024
    conference-web: https://www.luc.edu/
    status:
    authors: <u>Rachel Gordon</u>, Hyejoo Kang, Alexander R. Podgorsak, Mohammed Abuhamad.
    pdf: https://drive.google.com/file/d/1DuzTBMaGBus1fUfEtWtcX2zE9R2PKcQv/view
    code: https://github.com/rachelngordon/gancm
    slides: https://drive.google.com/file/d/1_gaAzzrvJnPvSDqchlOCbfLcUmq_Wtyp/view
    abstract-less: High-dose-rate (HDR) brachytherapy is a radiation treatment modality that places radioactive sources directly in cancerous regions. Radiation treatment planning for HDR prostate brachytherapy utilizes both CT and MRI to visualize the path of the radioactive source and the prostate gland, respectively.
    abstract-more: This work proposes GAN-CM, a conditional CT-to-MRI translation method based on generative adversarial networks. The generator incorporates semantic masks from the domain image to better capture anatomical detail and tissue characteristics in CT scans, improving MRI synthesis for clinically paired prostate cancer treatment planning data.
    tag: more_gancm
    category: medical-imaging

  - title: Identification and Analysis of the Spread of {Mis}information on Social Media
    system-name:
    gif: assets/img/research/misinfo-plot.png
    conference: Computational Data and Social Networks (CSoNet), 2023
    conference-web: https://link.springer.com/conference/csonet
    status:
    authors: Muhammad T. Khan, <u>Rachel Gordon</u>, Nimra Khan, Madeline Moran, Mohammed Abuhamad, Loretta Stalans, Jeffrey Huntsinger, Jennifer Forestal, Eric Chan-Tin.
    pdf: https://link.springer.com/chapter/10.1007/978-981-97-0669-3_33
    code:
    slides: https://drive.google.com/file/d/1YLiaL5guEJzFEY-AnMdFEMOwh_-uLsaO/view
    abstract-less: This work studies misinformation spread on X, previously Twitter, using quantitative social network analysis and a BERT-based model for misinformation classification.
    abstract-more: Posts, users, and follower networks were collected from COVID-19-related hashtags, processed, and manually labeled. The analysis tracks misinformation spread during 2021 and studies how information and misinformation communities interact. The model achieved 86% accuracy in classifying tweets as information or misinformation.
    tag: more_misinformation
    category: computational-social-science
